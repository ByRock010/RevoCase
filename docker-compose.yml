version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revocase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - db

  ui:
    build: ./ui
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
